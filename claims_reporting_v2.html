<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClaimsIQ — Self Reporting Platform</title>
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f4;
  --color-background-info:#e6f1fb;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b6b;
  --color-text-tertiary:#a0a0a0;
  --color-text-info:#185FA5;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.18);
  --color-border-primary:rgba(0,0,0,0.28);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1e;
    --color-background-secondary:#2a2a2a;
    --color-background-info:#0c2d4a;
    --color-text-primary:#e8e8e8;
    --color-text-secondary:#a0a0a0;
    --color-text-tertiary:#666;
    --color-text-info:#85B7EB;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.18);
    --color-border-primary:rgba(255,255,255,0.28);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary);background:var(--color-background-primary)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.logo{font-size:14px;font-weight:500}.logo span{color:#378ADD}
.hdr-tabs{display:flex;gap:2px}
.htab{padding:5px 12px;border:none;background:transparent;border-radius:6px;font-size:12px;cursor:pointer;color:var(--color-text-secondary)}
.htab.on{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.hdr-right{display:flex;align-items:center;gap:8px}
.fbar{display:flex;align-items:flex-start;gap:8px;padding:8px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-wrap:wrap;min-height:42px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;background:var(--color-background-info);color:var(--color-text-info);border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.chip-x{cursor:pointer;opacity:.7;font-size:14px;line-height:1;margin-left:2px;color:var(--color-text-info)}
.chip-x:hover{opacity:1}
.fbar-addbtn{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border:0.5px dashed var(--color-border-secondary);border-radius:20px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);background:transparent;white-space:nowrap}
.fbar-addbtn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.filter-form{display:inline-flex;align-items:center;gap:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:4px 8px}
.filter-form select,.filter-form input{border:none;background:transparent;font-size:12px;color:var(--color-text-primary);outline:none;padding:2px 4px}
.filter-form select{cursor:pointer;max-width:160px}
.filter-form input{width:110px}
.fbtn{padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.fbtn.primary{background:#378ADD;color:#fff;border-color:#378ADD}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.toolbar-l{display:flex;align-items:center;gap:8px}
.toolbar-r{display:flex;align-items:center;gap:6px}
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:7px;font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-primary)}
.tbtn:hover{background:var(--color-background-secondary)}
.tbtn.accent{background:#378ADD;color:#fff;border-color:#378ADD}
.tbtn.accent:hover{background:#185FA5}
.col-count-pill{display:inline-flex;align-items:center;justify-content:center;background:#378ADD;color:#fff;border-radius:10px;font-size:10px;font-weight:500;padding:1px 6px;min-width:20px}
.rec-count{font-size:12px;color:var(--color-text-secondary)}
.layout{display:flex;overflow:hidden}
.tbl-area{flex:1;overflow-x:auto;min-width:0;max-height:calc(100vh - 160px)}
table{border-collapse:collapse;font-size:12px;width:max-content;min-width:100%}
thead{position:sticky;top:0;z-index:2}
th{padding:8px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--color-text-primary)}
th.sticky-col{position:sticky;left:0;z-index:3;background:var(--color-background-secondary)}
td{padding:7px 12px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;color:var(--color-text-primary)}
td.sticky-col{position:sticky;left:0;z-index:1;background:var(--color-background-primary)}
tr:hover td{background:var(--color-background-secondary)}
tr:hover td.sticky-col{background:var(--color-background-secondary)}
.bdg{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.bdg-fire{background:#FAECE7;color:#993C1D}
.bdg-water{background:#E6F1FB;color:#185FA5}
.bdg-theft{background:#EEEDFE;color:#534AB7}
.bdg-storm{background:#FAEEDA;color:#854F0B}
.bdg-vandalism{background:#FBEAF0;color:#993556}
.bdg-earthquake{background:#EAF3DE;color:#3B6D11}
.bdg-open{background:#E6F1FB;color:#185FA5}
.bdg-closed{background:#EAF3DE;color:#1D9E75}
.bdg-pending{background:#FAEEDA;color:#854F0B}
.bdg-review{background:#EEEDFE;color:#534AB7}
.bdg-rejected{background:#FCEBEB;color:#A32D2D}
.drawer{width:0;flex-shrink:0;border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden;transition:width .18s ease;max-height:calc(100vh - 160px)}
.drawer.open{width:340px}
.dr-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.dr-head h3{font-size:13px;font-weight:500}
.dr-search{padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.dr-search input{width:100%;padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:7px;background:var(--color-background-secondary);color:var(--color-text-primary);font-size:12px;outline:none}
.dr-body{flex:1;overflow-y:auto}
.dr-cat{border-bottom:0.5px solid var(--color-border-tertiary)}
.dr-cat-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;background:var(--color-background-secondary);user-select:none}
.dr-cat-hdr:hover{background:var(--color-background-primary)}
.dr-cat-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;flex:1}
.dr-cat-cnt{font-size:10px;color:var(--color-text-tertiary)}
.dr-arrow{font-size:10px;color:var(--color-text-secondary);transition:transform .15s}
.dr-arrow.open{transform:rotate(90deg)}
.dr-cols{display:none;padding:4px 0}
.dr-cols.open{display:block}
.dr-col{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 36px;cursor:pointer;font-size:12px}
.dr-col:hover{background:var(--color-background-secondary)}
.dr-col input[type=checkbox]{cursor:pointer;width:13px;height:13px;accent-color:#378ADD}
.dr-col label{cursor:pointer;flex:1;color:var(--color-text-primary)}
.dr-col label em{color:#185FA5;font-style:normal;font-weight:500}
.dr-foot{padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--color-background-secondary)}
.dr-foot-info{font-size:11px;color:var(--color-text-secondary)}
.saved-area{padding:16px;display:flex;flex-direction:column;gap:8px}
.sq-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;cursor:pointer;background:var(--color-background-secondary)}
.sq-item:hover{border-color:var(--color-border-secondary)}
.sq-name{font-weight:500;font-size:13px}
.sq-meta{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.modal-bg{display:flex;align-items:center;justify-content:center;padding:40px 16px;background:rgba(0,0,0,.3);border-radius:12px;margin:16px}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:12px;padding:20px;width:360px;display:flex;flex-direction:column;gap:14px}
.modal h3{font-size:15px;font-weight:500}
.modal input{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:7px;font-size:13px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
.empty-row td{text-align:center;padding:40px;color:var(--color-text-secondary)}
.sort-ic{display:inline-block;margin-left:3px;font-size:9px;opacity:.5}
.sort-ic.on{opacity:1;color:#378ADD}
</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo"><span>Claims</span>IQ &mdash; Self Reporting</div>
      <div class="hdr-tabs">
        <button class="htab on" onclick="showPane('query',this)">Query builder</button>
        <button class="htab" onclick="showPane('saved',this)">Saved queries</button>
      </div>
    </div>
    <div class="hdr-right">
      <span style="font-size:11px;color:var(--color-text-secondary)">Property Insurance &middot; FY 2025</span>
    </div>
  </div>

  <div id="pane-query">
    <div class="fbar" id="fbar">
      <button class="fbar-addbtn" onclick="startAddFilter()">
        <svg width="11" height="11" viewBox="0 0 11 11"><line x1="5.5" y1="1" x2="5.5" y2="10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="1" y1="5.5" x2="10" y2="5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Add filter
      </button>
      <div id="filter-chips"></div>
      <div id="filter-form-container"></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-l">
        <span class="rec-count" id="rec-count">Loading&hellip;</span>
        <button class="tbtn" onclick="resetAll()" style="font-size:11px;padding:4px 8px;color:var(--color-text-secondary)">Reset all</button>
      </div>
      <div class="toolbar-r">
        <button class="tbtn" onclick="openSaveModal()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.1"/><path d="M4 1.5v3h5v-3" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><rect x="3" y="7" width="7" height="4" rx="1" stroke="currentColor" stroke-width="1.1"/></svg>
          Save query
        </button>
        <button class="tbtn" onclick="exportCSV()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9v3h9v-3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M6.5 1.5v6M4 5.5l2.5 2.5 2.5-2.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Export CSV
        </button>
        <button class="tbtn accent" onclick="toggleDrawer()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="3" width="11" height="1.1" rx=".5" fill="currentColor"/><rect x="1" y="6" width="11" height="1.1" rx=".5" fill="currentColor"/><rect x="1" y="9" width="7" height="1.1" rx=".5" fill="currentColor"/></svg>
          Columns
          <span class="col-count-pill" id="col-count-pill">0</span>
        </button>
      </div>
    </div>

    <div class="layout" id="main-layout">
      <div class="tbl-area" id="tbl-area">
        <table id="main-table">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="drawer" id="col-drawer">
        <div class="dr-head">
          <h3>Select columns</h3>
          <button class="fbtn" onclick="toggleDrawer()" style="padding:4px 8px;font-size:11px">Done</button>
        </div>
        <div class="dr-search"><input type="text" id="dr-search" placeholder="Search 500+ columns&hellip;" oninput="renderDrawer()"></div>
        <div class="dr-body" id="dr-body"></div>
        <div class="dr-foot">
          <span class="dr-foot-info" id="dr-sel-info">0 selected</span>
          <div style="display:flex;gap:6px">
            <button class="fbtn" onclick="clearAllCols()">Clear all</button>
            <button class="fbtn primary" onclick="selectDefault()">Reset default</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="pane-saved" style="display:none">
    <div class="saved-area" id="saved-area"><div style="color:var(--color-text-secondary);font-size:13px;padding:20px">No saved queries yet.</div></div>
  </div>

  <div id="pane-save-modal" style="display:none">
    <div class="modal-bg">
      <div class="modal">
        <h3>Save query</h3>
        <div style="font-size:13px;color:var(--color-text-secondary)">Give this query a name to reload it any time.</div>
        <input type="text" id="save-name-input" placeholder="e.g. Fire claims 2025 &mdash; North region"/>
        <div style="display:flex;gap:8px">
          <button class="fbtn primary" style="padding:7px 14px;font-size:13px" onclick="confirmSave()">Save</button>
          <button class="fbtn" style="padding:7px 14px;font-size:13px" onclick="closeSaveModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CATS=[
  {id:'claim',label:'Claim basics',cols:['Claim ID','Claim number','Claim type','Claim source','Claim channel','Filing method','Priority level','Complexity rating','Fast-track eligible','CAT claim','CAT code','Claim description','Incident description','Incident location','Incident address','Incident city','Incident state','Incident pincode','Incident country','Reported by','Reporter relationship','Reporter phone','Date of loss','Time of loss','Date filed','Date received','Date acknowledged','Claim year','Claim month','Claim quarter','Policy year','Reporting lag (days)','Late report flag','Duplicate claim flag','Fraud flag','Fraud score','Litigation flag','Subrogation potential','Media attention','Government claim','Third party involved','Third party name','Witness count','Police report filed','Police report number','FIR number','Fire brigade report','Survey required','Emergency service called','Claim notes']},
  {id:'policy',label:'Policy details',cols:['Policy number','Policy type','Policy sub-type','Product code','Product name','Policy start date','Policy end date','Policy term (months)','Renewal count','Policy status','Premium amount','Premium frequency','Deductible amount','Deductible type','Co-insurance %','Sum insured','Building sum insured','Content sum insured','Liability limit','Additional coverage','Endorsement count','Last endorsement date','Policy issued state','Policy issued city','Sales channel','Agent code','Agent name','Broker code','Broker name','Bancassurance partner','Policy source','Campaign code','Policy language','Claim-free years','Previous claim count','Lapse history','Re-instatement flag','Grace period days','Policy holder type','SME flag','Corporate flag','High-value flag','Group policy','Master policy number','Certificate number','Co-insurer name','Co-insurer share %','Reinsurance flag','Reinsurer name','Treaty type','Facultative flag','Quota share %','Retention amount','Cession amount','Net retained premium','Gross premium','Net premium','Fronting flag','Captive involved','Policy remarks']},
  {id:'property',label:'Property information',cols:['Property ID','Property type','Property sub-type','Property usage','Occupancy type','Construction type','Roof type','Roof material','Wall material','Foundation type','Year built','Year renovated','No. of floors','Floor area (sqft)','Built-up area','Carpet area','Plot area','No. of units','No. of rooms','No. of bathrooms','Basement flag','Attic flag','Garage flag','Swimming pool','Solar panels','Generator','CCTV installed','Fire alarm','Smoke detector','Sprinkler system','Fire extinguisher','Security guard','Watchman flag','Gated community','Heritage property','High-rise building','Landmark property','Distance to fire station (km)','Distance to water body (km)','Flood zone','Earthquake zone','Cyclone zone','Landslide zone','Property age','Property value','Valuation method','Valuation date','Valuer name','Last inspection date','Inspector name','Property condition','Structural condition','Electrical condition','Plumbing condition','Interior condition','Exterior condition','Mold presence','Asbestos flag','Hazardous materials','Previous damage history','Previous damage year','Previous damage type','Green building certified','RERA registered','Municipal approved','Occupancy certificate','Encumbrance flag','Mortgaged','Mortgage bank','Property PIN code','Property locality','Property district']},
  {id:'loss',label:'Loss & damage',cols:['Loss type','Loss sub-type','Loss cause','Loss trigger','Peril code','Named peril','Catastrophe event','CAT event code','Affected area (sqft)','Affected rooms','Structural damage','Roof damage','Wall damage','Floor damage','Electrical damage','Plumbing damage','HVAC damage','Furniture damage','Electronics damage','Appliance damage','Fixture damage','Personal effects damage','Vehicle damage (on premises)','Landscape damage','Boundary wall damage','Gate damage','Documents destroyed','Cash loss','Jewellery loss','Art & collectibles loss','Business interruption','Loss of rent','Loss of use','Temporary relocation required','Temporary accommodation cost','Total loss flag','Partial loss flag','Constructive total loss','Salvage possible','Debris removal required','Emergency repair done','Emergency repair cost','Water damage extent','Fire damage extent','Theft items count','Theft description','Vandalism extent','Storm damage type','Wind speed at time of loss','Rainfall (mm)','Seismic magnitude','Flood depth (ft)','Smoke damage','Soot damage','Heat damage','Water ingress','Mold after loss','Third-party property damage','Bodily injury','Bodily injury count','Environmental damage','Loss severity','Loss category','Loss sub-category','FNOL method']},
  {id:'financial',label:'Financial',cols:['Claimed amount','Estimated loss','Surveyor estimate','Desk estimate','Approved amount','Settlement amount','Repudiation amount','Deductible applied','Co-insurance applied','Depreciation applied','Salvage value','Recovery amount','Subrogation recovery','Reinsurance recovery','Net claim cost','Reserve amount','Reserve revision count','Initial reserve','Final reserve','IBNR reserve','Expense reserve','Loss adjustment expense','Survey fee','Legal fee','Expert fee','TPA fee','Emergency services cost','Debris removal cost','Temporary repair cost','Permanent repair cost','Replacement cost','ACV basis amount','RCV basis amount','Agreed value basis','Betterment deduction','Wear & tear deduction','Underpayment flag','Overpayment flag','Ex-gratia payment','Advance payment','Advance payment date','Final payment date','Payment mode','Payment account','Bank name','IFSC code','UTR number','Cheque number','Payment status','GST on claim','TDS deducted','Net payable','Currency','Exchange rate','Foreign currency amount','Benchmark loss ratio','Incurred amount','Paid amount','Outstanding amount','Large loss flag','Gross incurred','Net incurred','Allocated loss expense','Total claim cost','Financial year','Quarter','Reserve adequacy flag','Premium adequacy ratio','Profitability impact']},
  {id:'dates',label:'Dates & timelines',cols:['Date of loss','Time of loss','Date FNOL received','Date claim registered','Date acknowledged','Date surveyor appointed','Date survey conducted','Date survey report received','Date desk review done','Date policy checked','Date coverage confirmed','Date liability decision','Date quantum assessed','Date settlement offer','Date counter-offer','Date agreed settlement','Date payment initiated','Date payment processed','Date claim closed','Date reopened','Date final closure','Date of last activity','Days to FNOL','Days to register','Days to acknowledge','Days to appoint surveyor','Days to first survey','Days to survey report','Days to liability decision','Days to quantum','Days to settlement offer','Days to payment','Days to closure','Total cycle time (days)','SLA breach flag','SLA breach days','Acknowledgement SLA met','Survey SLA met','Liability SLA met','Payment SLA met','Closure SLA met','Date salvage collected','Date subrogation initiated','Date litigation filed','Date litigation resolved','Date arbitration filed','Date arbitration award','Date appeal filed','Date appeal resolved','Date fraud referral','Date fraud resolved','Date audit','Date QC review','Last updated date','Created date']},
  {id:'adjuster',label:'Adjuster & investigation',cols:['Assigned adjuster ID','Adjuster name','Adjuster type','Adjuster grade','Adjuster region','Adjuster team','Adjuster email','Adjuster phone','Adjuster license no.','Adjuster specialization','Surveyor ID','Surveyor name','Surveyor firm','Surveyor license','Surveyor category','Surveyor rating','Survey type','Survey method','Survey visits count','First survey date','Last survey date','Survey report status','Desk officer ID','Desk officer name','Desk officer team','QC reviewer ID','QC reviewer name','QC outcome','QC date','Claims manager ID','Claims manager name','Approval authority level','Approval authority name','TPA involved','TPA name','TPA reference','Medical expert appointed','Forensic expert appointed','Fire investigation done','Fire investigator name','Cause of loss determined','Cause confirmed flag','Investigation days','Re-inspection required','Re-inspection date','Re-inspection outcome','Field visit count','Field officer name','Fraud investigation flag','Fraud investigator name','Fraud investigation outcome','Investigation file status','Adjuster remarks','Survey remarks']},
  {id:'customer',label:'Customer & contact',cols:['Claimant ID','Claimant name','Claimant type','Claimant gender','Claimant DOB','Claimant age','Claimant occupation','Claimant income bracket','Claimant email','Claimant mobile','Claimant alt phone','Claimant address','Claimant city','Claimant state','Claimant pincode','Claimant nationality','PAN number','Aadhaar (masked)','GSTIN','KYC status','KYC verified date','KYC method','ID proof type','Address proof type','Policy holder name','Policy holder relation','Nominee name','Nominee relation','Legal heir involved','Power of attorney','Attorney name','Insured entity type','Corporate CIN','Corporate name','Authorized signatory','Insured rating','NPS score','Complaint filed','Complaint date','Complaint nature','Complaint resolved','Complaint resolution date','Media complaint','Ombudsman complaint','Ombudsman reference','Court case filed','Customer segment','Customer tenure (years)','VIP customer','Digital customer','Mobile app user','Portal registered','Email opt-in','SMS opt-in','Preferred language','Preferred contact mode','Communication history count','Previous dispute','Previous fraud','Blacklist flag']},
  {id:'legal',label:'Legal & compliance',cols:['Legal hold flag','Litigation status','Court name','Case number','Court order date','Court order outcome','Appeal filed','Appeal outcome','Arbitration flag','Arbitration reference','Arbitration award','Ombudsman referral','Ombudsman award','IRDAI complaint','IRDAI reference','Regulatory breach flag','Compliance check done','Compliance officer ID','AML flag','AML check date','AML outcome','Sanctions check','FATF flag','PEP flag','Fraud register','Crime reference number','Money laundering flag','Terrorism flag','Data breach flag','DPDP flag','Data sharing consent','Data retention flag','Legal opinion required','Legal opinion date','Legal counsel name','Legal cost','Decree obtained','Decree amount','Execution proceedings','Enforcement action','Repudiation reason code','Repudiation reason text','Repudiation communicated','Repudiation challenged','Legal reserve','Regulatory capital impact','Internal audit flag','External audit flag','Whistle-blower flag','Actuarial review flag']},
  {id:'recovery',label:'Recovery & subrogation',cols:['Subrogation flag','Subrogation type','Liable third party name','Liable party contact','Liable party insurer','Third party policy no.','Demand notice sent','Demand notice date','Demand amount','Recovery negotiation','Settlement with TP','TP settlement amount','Recovery received','Recovery date','Recovery method','Legal action for recovery','Recovery legal cost','Net recovery','Salvage flag','Salvage type','Salvage description','Salvage location','Salvage auctioned','Salvage auction date','Salvage realized','Salvage buyer','Salvage disposal method','Reinsurance claim filed','RI claim reference','RI recovery amount','RI recovery date','Co-insurer recovery','Co-insurer amount','Double insurance detected','Double insurance amount','Contribution clause applied','Other insurance details','Total recovery','Net loss after recovery','Recovery ratio %']}
];

function toKey(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'_')}

const ALL_COLS=[];
CATS.forEach(cat=>cat.cols.forEach(c=>{ALL_COLS.push({key:toKey(c),label:c,cat:cat.id,catLabel:cat.label})}));

const LOSS=['Fire','Water damage','Theft','Storm','Vandalism','Earthquake'];
const STATUS=['Open','Closed','Pending','Under review','Rejected'];
const REGIONS=['North','South','East','West'];
const PROP=['Residential','Commercial','Industrial','Mixed-use'];
const ADJ=['Priya Sharma','Ankit Mehta','Ravi Kumar','Sunita Patel','Deepak Joshi','Neha Singh'];
const NAMES=['Rajesh Gupta','Meena Verma','Suresh Agarwal','Kavita Rao','Amit Sinha','Pooja Tiwari','Harish Bhat','Nalini Iyer','Rajan Nair','Pradeep Yadav','Sundar Krishnan','Ananya Das'];
const CITIES=['Mumbai','Delhi','Bangalore','Chennai','Hyderabad','Pune','Ahmedabad','Kolkata','Jaipur','Surat'];
const CHANNELS=['Agent','Broker','Online','Walk-in','Bancassurance'];

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rnd(0,a.length-1)]}
function fmtD(d){return d.toISOString().slice(0,10)}

let DATA=[];
(function(){
  let id=2000;
  for(let y=2023;y<=2025;y++){
    for(let i=0;i<40;i++){
      const loss=pick(LOSS);const status=pick(STATUS);
      const mo=rnd(1,12);const dy=rnd(1,28);
      const dol=new Date(y,mo-1,dy);
      const filed=new Date(y,mo-1,dy+rnd(1,15));
      const claimed=rnd(80000,3000000);
      const ratio=status==='Closed'?rnd(50,100)/100:status==='Rejected'?0:rnd(0,50)/100;
      const approved=status==='Closed'||status==='Rejected'?Math.round(claimed*ratio):null;
      const days=status==='Closed'?rnd(15,200):null;
      const city=pick(CITIES);const region=pick(REGIONS);
      DATA.push({
        claim_id:'CLM-'+String(++id),
        claim_number:'CLM/'+y+'/'+String(rnd(10000,99999)),
        claim_type:pick(['Own damage','Third party','Liability','Personal accident']),
        claim_source:pick(CHANNELS),
        filing_method:pick(['Online portal','Email','Physical','Mobile app']),
        priority_level:pick(['Standard','High','Critical']),
        date_of_loss:fmtD(dol),
        claim_year:String(y),
        claim_month:dol.toLocaleString('default',{month:'short'}),
        date_filed:fmtD(filed),
        loss_type:loss,
        status:status,
        region:region,
        incident_city:city,
        incident_state:pick(['Maharashtra','Delhi','Karnataka','Tamil Nadu','Telangana','Gujarat']),
        policy_number:'POL-'+rnd(100000,999999),
        policy_type:pick(['Comprehensive','Standard','Basic','Premium']),
        sum_insured:rnd(500000,50000000),
        premium_amount:rnd(5000,80000),
        deductible_amount:rnd(5000,25000),
        property_type:pick(PROP),
        construction_type:pick(['RCC','Brick & mortar','Steel','Wood','Mixed']),
        year_built:rnd(1980,2020),
        claimant_name:pick(NAMES),
        claimant_mobile:'9'+rnd(100000000,999999999),
        claimant_city:city,
        claimant_state:pick(['Maharashtra','Delhi','Karnataka','Tamil Nadu','Telangana','Gujarat']),
        agent_name:pick(['Sundeep Arora','Kaveri Pillai','Mohan Lal','Reena Shah','Vikas Jain']),
        adjuster_name:pick(ADJ),
        surveyor_name:pick(['R.K. Associates','Apex Surveys','Modi & Co','National Surveyors','Elite Claims']),
        claimed_amount:claimed,
        approved_amount:approved,
        net_payable:approved?Math.round(approved*0.95):null,
        reserve_amount:Math.round(claimed*rnd(80,120)/100),
        total_cycle_time__days_:days,
        sla_breach_flag:days&&days>90?'Yes':'No',
        fraud_flag:Math.random()<0.05?'Yes':'No',
        subrogation_flag:Math.random()<0.1?'Yes':'No',
        large_loss_flag:claimed>1500000?'Yes':'No',
        payment_mode:status==='Closed'?pick(['NEFT','RTGS','Cheque','UPI']):'',
        tpa_involved:pick(['Yes','No']),
        kyc_status:pick(['Verified','Pending','Failed']),
        vip_customer:Math.random()<0.08?'Yes':'No',
        litigation_flag:Math.random()<0.06?'Yes':'No',
        complaint_filed:Math.random()<0.12?'Yes':'No',
        financial_year:y+'-'+String(y+1).slice(2),
        quarter:'Q'+Math.ceil(mo/3),
        recovery_ratio_:''+rnd(0,40)+'%'
      });
    }
  }
})();

const DEFAULT_COLS=['claim_id','claim_number','claimant_name','loss_type','date_of_loss','claim_year','status','region','incident_city','property_type','claimed_amount','approved_amount','adjuster_name','total_cycle_time__days_'];

let selectedCols=new Set(DEFAULT_COLS);
let activeFilters=[];
let filteredData=[...DATA];
let sortKey='',sortDir=1;
let savedQueries=[];
let drawerOpen=false;
let catOpen={};

CATS.forEach(c=>catOpen[c.id]=false);
catOpen['claim']=true;

function getVal(row,key){
  if(row[key]!==undefined)return row[key];
  const lk=key.toLowerCase();
  if(lk.includes('flag'))return pick(['Yes','No']);
  if(lk.includes('date'))return '2024-'+String(rnd(1,12)).padStart(2,'0')+'-'+String(rnd(1,28)).padStart(2,'0');
  if(lk.includes('amount')||lk.includes('cost')||lk.includes('value'))return '₹'+rnd(10000,500000).toLocaleString('en-IN');
  if(lk.includes('days')||lk.includes('count')||lk.includes('age'))return String(rnd(1,120));
  if(lk.includes('email'))return 'user'+rnd(100,999)+'@example.com';
  if(lk.includes('code')||lk.includes('no.')||lk.includes('number'))return 'REF-'+rnd(10000,99999);
  return '—';
}

function fmtVal(row,key){
  const v=row[key]!==undefined?row[key]:getVal(row,key);
  if(v===null||v===undefined||v==='')return '—';
  if(key==='loss_type'){const cl={'Fire':'fire','Water damage':'water','Theft':'theft','Storm':'storm','Vandalism':'vandalism','Earthquake':'earthquake'};return`<span class="bdg bdg-${cl[v]||'fire'}">${v}</span>`}
  if(key==='status'){const cl={'Open':'open','Closed':'closed','Pending':'pending','Under review':'review','Rejected':'rejected'};return`<span class="bdg bdg-${cl[v]||'open'}">${v}</span>`}
  if(key==='claimed_amount'||key==='approved_amount'||key==='net_payable'||key==='reserve_amount'||key==='sum_insured'||key==='premium_amount'){if(typeof v==='number')return'₹'+v.toLocaleString('en-IN');return v;}
  return String(v);
}

function applyFilters(){
  filteredData=DATA.filter(row=>{
    return activeFilters.every(f=>{
      const rv=String(row[f.col]||getVal(row,f.col)||'').toLowerCase();
      const fv=f.val.toLowerCase();
      if(f.op==='equals')return rv===fv;
      if(f.op==='contains')return rv.includes(fv);
      if(f.op==='starts with')return rv.startsWith(fv);
      if(f.op==='not equals')return rv!==fv;
      if(f.op==='is empty')return !rv||rv==='—';
      if(f.op==='is not empty')return rv&&rv!=='—';
      if(f.op==='greater than')return parseFloat(rv)>parseFloat(fv);
      if(f.op==='less than')return parseFloat(rv)<parseFloat(fv);
      return true;
    });
  });
  renderTable();updateRecCount();
}

function renderTable(){
  const cols=[...selectedCols].map(k=>ALL_COLS.find(c=>c.key===k)).filter(Boolean);
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  thead.innerHTML='<tr>'+cols.map((c,i)=>`<th class="${i===0?'sticky-col':''}" onclick="sortBy('${c.key}')">${c.label}<span class="sort-ic ${sortKey===c.key?'on':''}">${sortKey===c.key?(sortDir===1?'▲':'▼'):'⇅'}</span></th>`).join('')+'</tr>';
  const rows=[...filteredData];
  if(sortKey){rows.sort((a,b)=>{let av=a[sortKey]??getVal(a,sortKey),bv=b[sortKey]??getVal(b,sortKey);av=av??'';bv=bv??'';if(typeof av==='number'&&typeof bv==='number')return(av-bv)*sortDir;return String(av).localeCompare(String(bv))*sortDir});}
  if(!rows.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="${cols.length}">No records match your filters.</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>'<tr>'+cols.map((c,i)=>`<td class="${i===0?'sticky-col':''}">${fmtVal(r,c.key)}</td>`).join('')+'</tr>').join('');
  document.getElementById('col-count-pill').textContent=selectedCols.size;
  if(document.getElementById('dr-sel-info'))document.getElementById('dr-sel-info').textContent=selectedCols.size+' of '+ALL_COLS.length+' selected';
}

function sortBy(k){sortKey===k?sortDir*=-1:(sortKey=k,sortDir=1);renderTable();}
function updateRecCount(){document.getElementById('rec-count').textContent='Showing '+filteredData.length+' of '+DATA.length+' records';}

function startAddFilter(){
  const fc=document.getElementById('filter-form-container');
  if(fc.querySelector('.filter-form'))return;
  const colOpts=CATS.map(cat=>`<optgroup label="${cat.label}">${cat.cols.map(c=>`<option value="${toKey(c)}">${c}</option>`).join('')}</optgroup>`).join('');
  fc.innerHTML=`<div class="filter-form"><select id="ff-col">${colOpts}</select><select id="ff-op"><option>contains</option><option>equals</option><option>not equals</option><option>starts with</option><option>greater than</option><option>less than</option><option>is empty</option><option>is not empty</option></select><input type="text" id="ff-val" placeholder="value…"/><button class="fbtn primary" onclick="addFilter()">Add</button><button class="fbtn" onclick="cancelFilter()">✕</button></div>`;
}

function addFilter(){
  const col=document.getElementById('ff-col').value;
  const op=document.getElementById('ff-op').value;
  const val=document.getElementById('ff-val').value;
  const colLabel=ALL_COLS.find(c=>c.key===col)?.label||col;
  activeFilters.push({col,op,val,colLabel});
  document.getElementById('filter-form-container').innerHTML='';
  renderChips();applyFilters();
}

function cancelFilter(){document.getElementById('filter-form-container').innerHTML='';}
function removeFilter(i){activeFilters.splice(i,1);renderChips();applyFilters();}

function renderChips(){
  const el=document.getElementById('filter-chips');
  el.innerHTML=activeFilters.map((f,i)=>`<div class="chip">${f.colLabel} <span style="opacity:.6">${f.op}</span> ${f.op==='is empty'||f.op==='is not empty'?'':f.val}<span class="chip-x" onclick="removeFilter(${i})">×</span></div>`).join('');
}

function toggleDrawer(){
  drawerOpen=!drawerOpen;
  const d=document.getElementById('col-drawer');
  drawerOpen?d.classList.add('open'):d.classList.remove('open');
  renderDrawer();
}

function renderDrawer(){
  const q=(document.getElementById('dr-search')?.value||'').toLowerCase();
  const body=document.getElementById('dr-body');
  body.innerHTML=CATS.map(cat=>{
    const filtered=cat.cols.filter(c=>!q||c.toLowerCase().includes(q));
    if(!filtered.length)return'';
    const selInCat=filtered.filter(c=>selectedCols.has(toKey(c))).length;
    const allSel=selInCat===filtered.length;
    const isOpen=catOpen[cat.id]||!!q;
    return`<div class="dr-cat"><div class="dr-cat-hdr" onclick="toggleCat('${cat.id}')"><input type="checkbox" ${allSel?'checked':''} onclick="event.stopPropagation();toggleCatAll('${cat.id}','${q}')" style="cursor:pointer;accent-color:#378ADD"><span class="dr-cat-label">${cat.label}</span><span class="dr-cat-cnt">${selInCat}/${filtered.length}</span><span class="dr-arrow ${isOpen?'open':''}">▶</span></div><div class="dr-cols ${isOpen?'open':''}">${filtered.map(c=>{const k=toKey(c);const highlighted=q?c.replace(new RegExp('('+q+')','gi'),'<em>$1</em>'):c;return`<div class="dr-col"><input type="checkbox" id="cb_${k}" ${selectedCols.has(k)?'checked':''} onchange="toggleCol('${k}')" style="accent-color:#378ADD"><label for="cb_${k}">${highlighted}</label></div>`;}).join('')}</div></div>`;
  }).join('');
  if(document.getElementById('dr-sel-info'))document.getElementById('dr-sel-info').textContent=selectedCols.size+' of '+ALL_COLS.length+' selected';
}

function toggleCat(id){catOpen[id]=!catOpen[id];renderDrawer();}

function toggleCatAll(catId,q){
  const cat=CATS.find(c=>c.id===catId);
  const filtered=q?cat.cols.filter(c=>c.toLowerCase().includes(q)):cat.cols;
  const keys=filtered.map(c=>toKey(c));
  const allSel=keys.every(k=>selectedCols.has(k));
  keys.forEach(k=>allSel?selectedCols.delete(k):selectedCols.add(k));
  renderDrawer();renderTable();
}

function toggleCol(k){selectedCols.has(k)?selectedCols.delete(k):selectedCols.add(k);renderDrawer();renderTable();}
function clearAllCols(){selectedCols.clear();renderDrawer();renderTable();}
function selectDefault(){selectedCols=new Set(DEFAULT_COLS);renderDrawer();renderTable();}

function resetAll(){
  activeFilters=[];renderChips();
  document.getElementById('filter-form-container').innerHTML='';
  selectedCols=new Set(DEFAULT_COLS);
  filteredData=[...DATA];sortKey='';sortDir=1;
  renderDrawer();renderTable();updateRecCount();
}

function exportCSV(){
  const cols=[...selectedCols].map(k=>ALL_COLS.find(c=>c.key===k)).filter(Boolean);
  const rows=[...filteredData];
  const hdr=cols.map(c=>c.label).join(',');
  const body=rows.map(r=>cols.map(c=>{const v=r[c.key]!==undefined?r[c.key]:getVal(r,c.key);const s=String(v===null?'':v);return s.includes(',')?`"${s}"`:s;}).join(',')).join('\n');
  const blob=new Blob([hdr+'\n'+body],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='claims_export.csv';a.click();
}

function openSaveModal(){showPane('save-modal',null);}
function closeSaveModal(){showPane('query',document.querySelectorAll('.htab')[0]);}

function confirmSave(){
  const name=document.getElementById('save-name-input')?.value?.trim();
  if(!name)return;
  savedQueries.push({name,filters:[...activeFilters],cols:[...selectedCols],count:filteredData.length,ts:new Date().toLocaleTimeString()});
  closeSaveModal();renderSaved();
}

function renderSaved(){
  const el=document.getElementById('saved-area');
  if(!savedQueries.length){el.innerHTML='<div style="color:var(--color-text-secondary);font-size:13px;padding:20px">No saved queries yet.</div>';return;}
  el.innerHTML=savedQueries.map((q,i)=>`<div class="sq-item" onclick="loadQuery(${i})"><div><div class="sq-name">${q.name}</div><div class="sq-meta">${q.count} records &middot; ${q.cols.length} columns &middot; ${q.filters.length} filter${q.filters.length!==1?'s':''} &middot; ${q.ts}</div></div><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="var(--color-text-secondary)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`).join('');
}

function loadQuery(i){
  const q=savedQueries[i];
  activeFilters=[...q.filters];selectedCols=new Set(q.cols);
  renderChips();applyFilters();renderDrawer();
  showPane('query',document.querySelectorAll('.htab')[0]);
}

function showPane(name,btn){
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('pane-query').style.display=name==='query'?'block':'none';
  document.getElementById('pane-saved').style.display=name==='saved'?'block':'none';
  document.getElementById('pane-save-modal').style.display=name==='save-modal'?'block':'none';
  if(name==='saved')renderSaved();
}

renderTable();applyFilters();updateRecCount();
</script>
</body>
</html>
